<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ווינר סל">
<meta name="description" content="ניחוש מנצחת · ליגת ווינר סל">

<link rel="apple-touch-icon" href="icon-192.png">
<title>ניחוש מנצחת · ליגת ווינר סל</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #080810; --card: #13132a; --card2: #0f0f22;
    --orange: #ff4500; --gold: #ffd700; --green: #22c55e;
    --blue: #3b82f6; --red: #f87171;
    --text: #fff; --muted: #ffffff55; --border: #ffffff12;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; direction: rtl; overflow: hidden; touch-action: pan-y; }
  .content { -webkit-overflow-scrolling: touch; }
  #app { height: 100vh; display: flex; flex-direction: column; position: relative; }
  .bg-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 40% at 20% 10%, #ff450012, transparent),
                radial-gradient(ellipse 50% 50% at 80% 80%, #ffd70010, transparent); }
  .header { position: relative; z-index: 10; background: #0d0d1a; border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .notif-btn { font-size: 20px; background: #ffffff10; border: 1px solid #ffffff20; border-radius: 12px;
    width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .notif-btn.on { background: #ffd70022; border-color: #ffd70066; }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; position: relative; z-index: 1; padding-bottom: 100px; }
  .nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; background: #0d0d1a; border-top: 1px solid var(--border); display: flex; flex-shrink: 0; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 14px; border: none;
    background: transparent; color: #ffffff44; cursor: pointer; font-family: inherit; position: relative; transition: color 0.2s; font-size: 10px; font-weight: 600; }
  .nav-btn.active { color: var(--gold); }
  .nav-icon { font-size: 20px; margin-bottom: 2px; }
  .live-dot { position: absolute; top: 8px; right: calc(50% - 12px); width: 7px; height: 7px; border-radius: 50%;
    background: var(--orange); box-shadow: 0 0 6px var(--orange); animation: blink 1.5s infinite; }
  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 999; padding: 12px 20px;
    border-radius: 14px; font-size: 13px; font-weight: 700; color: #fff; box-shadow: 0 4px 24px #00000066;
    white-space: nowrap; animation: slideDown 0.3s ease; pointer-events: none; }
  .pills { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .pills::-webkit-scrollbar { display: none; }
  .pill { flex-shrink: 0; padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border);
    background: #ffffff08; color: #ffffff66; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .pill.active { background: linear-gradient(135deg, var(--orange), #ff8c00); border-color: transparent; color: #fff; box-shadow: 0 4px 20px #ff450044; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .card { background: linear-gradient(135deg, var(--card), var(--card2)); border-radius: 18px; border: 1px solid var(--border);
    padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 4px 20px #00000030; }
  .card.filled { border-color: #ffd70030; box-shadow: 0 4px 24px #ffd70015; }
  .card-meta { display: flex; justify-content: center; margin-bottom: 12px; }
  .round-tag { background: #ff450022; color: #ff8c00; border-radius: 8px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  .live-chip { background: #ff450022; color: var(--orange); border-radius: 8px; padding: 2px 10px; font-size: 12px; font-weight: 800; }
  .teams-pick-row { display: flex; align-items: center; gap: 8px; }
  .team-pick-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 8px;
    border-radius: 14px; border: 2px solid #ffffff15; background: #ffffff05; cursor: pointer; font-family: inherit; transition: all 0.2s; position: relative; }
  .team-pick-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .team-pick-btn.sel-home { border-color: var(--tc, #ff4500); background: color-mix(in srgb, var(--tc, #ff4500) 15%, transparent); box-shadow: 0 0 18px color-mix(in srgb, var(--tc, #ff4500) 40%, transparent); }
  .team-pick-btn.sel-away { border-color: var(--tc, #3b82f6); background: color-mix(in srgb, var(--tc, #3b82f6) 15%, transparent); box-shadow: 0 0 18px color-mix(in srgb, var(--tc, #3b82f6) 40%, transparent); }
  .team-badge { width: 44px; height: 44px; border-radius: 12px; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .team-name { font-size: 11px; font-weight: 700; color: #ffffffcc; text-align: center; line-height: 1.3; }
  .team-label { font-size: 10px; color: #ffffff33; }
  .check-badge { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%;
    background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }
  .vs-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .vs-text { font-size: 16px; font-weight: 900; color: #ffffff22; }
  .pred-tag { margin-top: 10px; font-size: 12px; color: #ffd700aa; text-align: center; font-weight: 700; padding-top: 8px; border-top: 1px solid #ffffff0f; }
  .winner-badge { font-size: 10px; font-weight: 800; color: var(--gold); background: #ffd70018; border-radius: 6px; padding: 2px 6px; margin-top: 4px; }
  .live-score-box { display: flex; align-items: center; gap: 10px; }
  .live-num { font-size: 32px; font-weight: 900; transition: all 0.3s; }
  .live-num.flash { color: var(--gold); transform: scale(1.2); }
  .dash { font-size: 18px; color: #ffffff33; }
  .submit-area { margin-top: 14px; }
  .prog-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .prog-label { font-size: 12px; color: var(--muted); text-align: center; }
  .prog-track { height: 5px; background: #ffffff10; border-radius: 10px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--orange), var(--gold)); border-radius: 10px; transition: width 0.3s ease; }
  .submit-btn { width: 100%; padding: 15px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--orange), var(--gold));
    color: #000; font-size: 16px; font-weight: 900; cursor: pointer; font-family: inherit; box-shadow: 0 8px 32px #ff450044; transition: transform 0.1s; }
  .submit-btn:active { transform: scale(0.97); }
  .submitted-banner { background: #22c55e18; border: 1px solid #22c55e44; border-radius: 14px; padding: 14px 16px;
    font-size: 14px; color: var(--green); font-weight: 600; text-align: center; margin-top: 12px; }
  .empty { text-align: center; color: #ffffff33; padding: 40px 0; font-size: 15px; line-height: 2; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat-box { flex: 1; background: var(--card); border-radius: 16px; border: 1px solid; padding: 12px 6px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-val { font-size: 18px; font-weight: 900; }
  .stat-label { font-size: 9px; color: var(--muted); font-weight: 600; text-align: center; }
  .hist-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
  .hist-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
  .hist-round { font-size: 14px; font-weight: 700; color: #ffffffcc; }
  .hist-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .hist-right { display: flex; align-items: center; gap: 12px; }
  .hist-points { font-size: 18px; font-weight: 900; }
  .hist-details { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 8px; }
  .hist-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 10px; border: 1px solid; background: #ffffff05; font-size: 12px; }
  .leader-row { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 12px 16px; margin-bottom: 8px; }
  .leader-row.me { border-color: #3b82f644; background: #3b82f610; }
  .leader-rank { font-size: 20px; width: 30px; text-align: center; }
  .leader-avatar { font-size: 26px; }
  .leader-info { flex: 1; }
  .leader-name { font-size: 14px; font-weight: 700; }
  .leader-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .leader-pts-val { font-size: 22px; font-weight: 900; display: flex; flex-direction: column; align-items: flex-end; }
  .leader-pts-lbl { font-size: 10px; font-weight: 600; color: var(--muted); }
  .invite-box { margin-top: 18px; background: linear-gradient(135deg, #1a1a3a, var(--card)); border-radius: 18px; border: 1px solid #3b82f633; padding: 18px 16px; text-align: center; }
  .invite-title { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
  .invite-sub { font-size: 13px; color: #ffffff66; margin-bottom: 14px; }
  .invite-btn { padding: 10px 24px; border-radius: 12px; border: 1px solid #3b82f666; background: #3b82f622; color: var(--blue); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .avatar-btn { width: 52px; height: 52px; border-radius: 16px; font-size: 26px; border: 2px solid #ffffff15; background: #ffffff08; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .avatar-btn.picked { border-color: var(--gold); background: #ffd70022; transform: scale(1.15); }
  .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; gap: 12px; color: #ffffff44; font-size: 13px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ffffff15; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes slideUpBox { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>

<!-- הרשמה -->
<div id="regOverlay" style="position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;">
  <div style="font-size:56px;margin-bottom:16px;animation:bounce 1.5s infinite ease-in-out">🏀</div>
  <div style="font-size:26px;font-weight:900;margin-bottom:6px;text-align:center">ברוך הבא לליגת ווינר סל!</div>
  <div style="font-size:14px;color:#ffffff66;margin-bottom:28px;text-align:center">בחר כינוי ואמוג׳י — ותתחרה עם חברים</div>
  <div id="avatarPicker" style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;justify-content:center"></div>
  <div style="width:100%;max-width:320px;margin-bottom:20px;position:relative">
    <input id="nicknameInput" type="text" maxlength="16" placeholder="הכינוי שלך..." oninput="onNicknameInput()"
      style="width:100%;padding:16px 18px;border-radius:16px;border:2px solid #ffffff20;background:#ffffff08;color:#fff;font-size:18px;font-family:inherit;outline:none;text-align:right;direction:rtl"
      onfocus="this.style.borderColor='#ffd700'" onblur="this.style.borderColor='#ffffff20'" />
    <span id="charCount" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:11px;color:#ffffff33">0/16</span>

  <div id="similarNameWarning" style="display:none;width:100%;max-width:320px;margin-top:-12px;margin-bottom:12px;background:#f59e0b18;border:1px solid #f59e0b55;border-radius:12px;padding:10px 14px;font-size:13px;color:#f59e0b;line-height:1.5;text-align:right"></div>

    <button class="nav-btn" id="tab-history" onclick="setTab('history')"><span class="nav-icon">📊</span>היסטוריה</button>

<div id="pwModal" style="display:none;position:fixed;inset:0;z-index:400;background:#000000cc;align-items:center;justify-content:center">
  <div style="background:#13132a;border-radius:20px;border:1px solid #ffffff15;padding:28px 24px;width:280px;text-align:center">

      <button onclick="checkAdminPw()"
        style="flex:1;padding:11px;border-radius:12px;border:none;background:linear-gradient(135deg,#ff4500,#ffd700);color:#000;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit">כניסה</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "%%FIREBASE_API_KEY%%",
  authDomain: "%%FIREBASE_AUTH_DOMAIN%%",
  projectId: "%%FIREBASE_PROJECT_ID%%",
  storageBucket: "%%FIREBASE_STORAGE_BUCKET%%",
  messagingSenderId: "%%FIREBASE_MESSAGING_SENDER_ID%%",
  appId: "%%FIREBASE_APP_ID%%"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
window._db = db;
window._fsDoc = doc;
window._fsSetDoc = setDoc;
window._fsGetDoc = getDoc;
window._fsCollection = collection;
window._fsOnSnapshot = onSnapshot;
window._fsQuery = query;
window._fsOrderBy = orderBy;
window._fsDeleteDoc = deleteDoc;
window._fsUpdateDoc = updateDoc;
window._fsDoc = doc;
window._db = db;
window._fsGetDocs = getDocs;
window._firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>

<script>
// ─── TEAMS ───────────────────────────────────────────────────────────────────
const TEAMS = [
  { id:1,  short:'מכבי ת"א',     color:'#FFD700', logo:'🏆' },
  { id:2,  short:'הפועל ת"א',    color:'#DC143C', logo:'🦅' },
  { id:3,  short:'הפועל י-ם',    color:'#FF4500', logo:'🔥' },
  { id:4,  short:'חולון',         color:'#1E90FF', logo:'💙' },
  { id:5,  short:'נס ציונה',      color:'#228B22', logo:'💎' },
  { id:6,  short:'נתניה',         color:'#8B4513', logo:'⚡' },
  { id:7,  short:'מכבי ר"ג',     color:'#4169E1', logo:'🔵' },
  { id:9,  short:'הרצליה',        color:'#FF8C00', logo:'🏀' },
  { id:10, short:'גליל עליון',    color:'#2E8B57', logo:'🌿' },
  { id:11, short:'קריית אתא',     color:'#9400D3', logo:'🟣' },
  { id:12, short:'באר שבע',       color:'#FF6347', logo:'🌵' },
  { id:13, short:'הפועל העמק',    color:'#DAA520', logo:'🟡' },
  { id:14, short:'מכבי רעננה',   color:'#00CED1', logo:'🌊' },
  { id:15, short:'מכבי ראשל"צ',  color:'#FF69B4', logo:'🌸' },
];

// GAMES נטען דינמית מ-Firebase
let GAMES = [];

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab = 'predict', activeRound = null, notifOn = false;
let predictions = {};   // { gameId: 'home'|'away' }
let submitted = {};     // { round: true }
let currentUser = null; // { id, name, avatar }
let leaderboard = [];   // מ-Firestore
let expandedRound = null;
let liveGames = [];

/* TEAM_LOGOS loaded from logos.js */

const getTeam = id => TEAMS.find(t => t.id === id);
const getRounds = () => [...new Set(GAMES.map(g => g.round))].sort((a,b) => a-b);
function formatGameDateTime(g) {
  if (!g.date) return '';
  const d = new Date(g.date + (g.time ? 'T' + g.time : 'T00:00'));
  const dateStr = d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', weekday: 'short' });
  const timeStr = g.time ? d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }) : '';
  return timeStr ? dateStr + ' u00b7 ' + timeStr : dateStr;
}

function showToast(msg, color='#22c55e') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
function toggleNotif() {
  notifOn = !notifOn;
  const btn = document.getElementById('notifBtn');
  btn.textContent = notifOn ? '🔔' : '🔕';
  btn.className = 'notif-btn' + (notifOn ? ' on' : '');
  showToast(notifOn ? '🔔 התראות הופעלו!' : '🔕 התראות כובו', notifOn ? '#22c55e' : '#3b82f6');
}
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}
function setRound(r) { activeRound = r; render(); }
function render() {
  const c = document.getElementById('content');
  if (currentTab === 'predict')      c.innerHTML = renderPredict();
  else if (currentTab === 'live')    c.innerHTML = renderLive();
  else if (currentTab === 'history') c.innerHTML = renderHistory();
  else if (currentTab === 'leaders') c.innerHTML = renderLeaders();
}

// ─── FIREBASE HELPERS ─────────────────────────────────────────────────────────
async function savePredictionsToFirebase() {
  if (!window._db || !currentUser) return;
  const db = window._db;
  const correct = countCorrect();
  const points = correct * 3;
  await window._fsSetDoc(window._fsDoc(db, 'users', currentUser.id), {
    name: currentUser.name,
    avatar: currentUser.avatar,
    predictions,
    submitted,
    points,
    correct,
    updatedAt: Date.now()
  });
}

async function loadMyDataFromFirebase() {
  if (!window._db || !currentUser) return;
  const db = window._db;
  const snap = await window._fsGetDoc(window._fsDoc(db, 'users', currentUser.id));
  if (snap.exists()) {
    const data = snap.data();
    predictions = data.predictions || {};
    submitted = data.submitted || {};
  }
}

function listenLeaderboard() {
  if (!window._db) return;
  const db = window._db;
  const q = window._fsQuery(window._fsCollection(db, 'users'), window._fsOrderBy('points', 'desc'));
  window._fsOnSnapshot(q, snap => {
    leaderboard = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentTab === 'leaders') render();
  });
}

function countCorrect() {
  let c = 0;
  GAMES.filter(g => g.status === 'finished').forEach(g => {
    const pick = predictions[g.id];
    if (!pick) return;
    const winner = g.hs > g.as ? 'home' : 'away';
    if (pick === winner) c++;
  });
  return c;
}

// ─── PREDICT ─────────────────────────────────────────────────────────────────
function renderPredict() {
  const rGames   = GAMES.filter(g => g.round === activeRound);
  const upcoming = rGames.filter(g => g.status === 'upcoming');
  const finished = rGames.filter(g => g.status === 'finished');
  const isSubmitted = submitted[activeRound];
  const filled = upcoming.filter(g => predictions[g.id] !== undefined).length;

  let html = '<div class="pills">';
  getRounds().forEach(r => {
    html += `<button class="pill ${r===activeRound?'active':''}" onclick="setRound(${r})">מחזור ${r}</button>`;
  });
  html += '</div>';

  if (upcoming.length > 0) {
    html += '<div class="section-label">🏀 בחר מנצחת</div>';
    upcoming.forEach(g => { html += renderGameCard(g, isSubmitted); });
    if (!isSubmitted) {
      const pct = upcoming.length ? (filled / upcoming.length * 100).toFixed(0) : 0;
      html += `<div class="submit-area">
        <div class="prog-row">
          <div class="prog-label">${filled}/${upcoming.length} נבחרו</div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        </div>
        <button class="submit-btn" onclick="submitPredictions()">שלח ניחושים 🎯</button>
      </div>`;
    } else {
      html += `<div class="submitted-banner">✅ ניחושים נשלחו למחזור ${activeRound}!</div>`;
    }
  }

  if (finished.length > 0) {
    html += '<div class="section-label" style="margin-top:20px">✅ תוצאות</div>';
    [...finished].sort((a, b) => {
      const da = new Date((a.date || '1970-01-01') + 'T' + (a.time || '23:59'));
      const db = new Date((b.date || '1970-01-01') + 'T' + (b.time || '23:59'));
      return db - da;
    }).forEach(g => { html += renderFinishedCard(g); });
  }

  if (!upcoming.length && !finished.length) html += '<div class="empty">אין משחקים למחזור זה</div>';
  return html;
}

function renderGameCard(g, locked) {
  const home = getTeam(g.home), away = getTeam(g.away);
  const pick = predictions[g.id];
  const winnerLabel = pick ? (pick==='home' ? `✓ ${home.short} מנצחת` : `✓ ${away.short} מנצחת`) : '';
  return `
    <div class="card ${pick!==undefined?'filled':''}">
      <div class="card-meta" style="flex-direction:column;gap:4px">
        <span class="round-tag">מחזור ${g.round}</span>
        ${g.date && g.date !== 'undefined' ? `<span style="font-size:12px;color:#ffd700;font-weight:700">📅 ${formatGameDateTime(g)}</span>` : ''}
      </div>
      <div class="teams-pick-row">
        <button class="team-pick-btn ${pick==='home'?'sel-home':''}" style="--tc:${home.color}"
          ${locked?'disabled':''} onclick="pickWinner(${g.id},'home')">
          ${pick==='home'?'<span class="check-badge">✓</span>':''}
          <div class="team-badge" style="background:${home.color}22;border-color:${home.color}88;overflow:hidden;padding:2px"><img src="${TEAM_LOGOS[home.id]||''}" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display='none';this.parentNode.textContent='${home.logo}'"></div>
          <span class="team-name">${home.short}</span>
          <span class="team-label">בית</span>
        </button>
        <div class="vs-col"><span class="vs-text">VS</span></div>
        <button class="team-pick-btn ${pick==='away'?'sel-away':''}" style="--tc:${away.color}"
          ${locked?'disabled':''} onclick="pickWinner(${g.id},'away')">
          ${pick==='away'?'<span class="check-badge">✓</span>':''}
          <div class="team-badge" style="background:${away.color}22;border-color:${away.color}88;overflow:hidden;padding:2px"><img src="${TEAM_LOGOS[away.id]||''}" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display='none';this.parentNode.textContent='${away.logo}'"></div>
          <span class="team-name">${away.short}</span>
          <span class="team-label">חוץ</span>
        </button>
      </div>
      ${pick!==undefined?`<div class="pred-tag">${winnerLabel}</div>`:''}
    </div>`;
}

function renderFinishedCard(g) {
  const home = getTeam(g.home), away = getTeam(g.away);
  const pick = predictions[g.id];
  const winner = g.hs > g.as ? 'home' : 'away';
  let predHtml = '';
  if (pick !== undefined) {
    const ok = pick === winner;
    predHtml = `<div class="pred-tag" style="color:${ok?'#22c55e':'#f87171'}">${ok?`✅ ניחשת נכון!`:`❌ ניחשת: ${pick==='home'?home.short:away.short}`}</div>`;
  }
  return `
    <div class="card" style="opacity:0.9">
      <div class="card-meta" style="flex-direction:column;gap:4px">
        <span class="round-tag">מחזור ${g.round}</span>
        ${g.date && g.date !== 'undefined' ? `<span style="font-size:12px;color:#ffd700;font-weight:700">📅 ${formatGameDateTime(g)}</span>` : ''}
      </div>
      <div class="teams-pick-row">
        <div class="team-pick-btn" style="border-color:${winner==='home'?home.color+'88':'#ffffff10'}">
          <div class="team-badge" style="background:${home.color}22;border-color:${home.color}88;overflow:hidden;padding:2px"><img src="${TEAM_LOGOS[home.id]||''}" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display='none';this.parentNode.textContent='${home.logo}'"></div>
          <span class="team-name">${home.short}</span>
          <span style="font-size:22px;font-weight:900;color:#fff;margin-top:2px">${g.hs}</span>
          ${winner==='home'?'<span class="winner-badge">🏆 ניצחה</span>':''}
        </div>
        <div class="vs-col"><span class="dash">—</span></div>
        <div class="team-pick-btn" style="border-color:${winner==='away'?away.color+'88':'#ffffff10'}">
          <div class="team-badge" style="background:${away.color}22;border-color:${away.color}88;overflow:hidden;padding:2px"><img src="${TEAM_LOGOS[away.id]||''}" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display='none';this.parentNode.textContent='${away.logo}'"></div>
          <span class="team-name">${away.short}</span>
          <span style="font-size:22px;font-weight:900;color:#fff;margin-top:2px">${g.as}</span>
          ${winner==='away'?'<span class="winner-badge">🏆 ניצחה</span>':''}
        </div>
      </div>
      ${predHtml}
    </div>`;
}

async function pickWinner(gameId, side) {
  if (predictions[gameId] === side) delete predictions[gameId];
  else predictions[gameId] = side;
  const upcoming = GAMES.filter(x => x.round===activeRound && x.status==='upcoming');
  const filled = upcoming.filter(x => predictions[x.id]!==undefined).length;
  const pf = document.querySelector('.prog-fill'), pl = document.querySelector('.prog-label');
  if (pf) pf.style.width = `${filled/upcoming.length*100}%`;
  if (pl) pl.textContent = `${filled}/${upcoming.length} נבחרו`;
  render();
  await savePredictionsToFirebase();
}

async function submitPredictions() {
  const upcoming = GAMES.filter(g => g.round===activeRound && g.status==='upcoming');
  if (upcoming.filter(g => predictions[g.id]!==undefined).length < upcoming.length) {
    showToast('⚠️ בחר מנצחת לכל המשחקים', '#f59e0b'); return;
  }
  submitted[activeRound] = true;
  await savePredictionsToFirebase();
  showToast('✅ הניחושים נשלחו! בהצלחה!');
  render();
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function renderHistory() {
  const finishedGames = GAMES.filter(g => g.status === 'finished');
  const rounds = [...new Set(finishedGames.map(g => g.round))].sort((a,b) => b-a);

  // סטטיסטיקה מצטברת
  let totalCorrect = 0, totalGames = finishedGames.length;
  finishedGames.forEach(g => {
    const pick = predictions[g.id];
    if (!pick) return;
    if (pick === (g.hs > g.as ? 'home' : 'away')) totalCorrect++;
  });
  const totalPts = totalCorrect * 3;
  const pct = totalGames ? Math.round(totalCorrect / totalGames * 100) : 0;

  let html = `
    <div class="stats-row">
      <div class="stat-box" style="border-color:#ffd70044"><span style="font-size:22px">🏅</span><div class="stat-val" style="color:#ffd700">${totalPts}</div><div class="stat-label">סה״כ נקודות</div></div>
      <div class="stat-box" style="border-color:#22c55e44"><span style="font-size:22px">🎯</span><div class="stat-val" style="color:#22c55e">${pct}%</div><div class="stat-label">אחוז הצלחה</div></div>
      <div class="stat-box" style="border-color:#3b82f644"><span style="font-size:22px">✅</span><div class="stat-val" style="color:#3b82f6">${totalCorrect}/${totalGames}</div><div class="stat-label">ניחושים נכונים</div></div>
    </div>`;

  if (!rounds.length) {
    html += '<div class="empty">אין תוצאות עדיין</div>';
    return html;
  }

  rounds.forEach(round => {
    const rGames = finishedGames.filter(g => g.round === round);
    let roundCorrect = 0, roundPicked = 0;
    [...rGames].sort((a, b) => {
      const da = new Date((a.date || '1970-01-01') + 'T' + (a.time || '23:59'));
      const db = new Date((b.date || '1970-01-01') + 'T' + (b.time || '23:59'));
      return db - da;
    }).forEach(g => {
      const pick = predictions[g.id];
      if (!pick) return;
      roundPicked++;
      if (pick === (g.hs > g.as ? 'home' : 'away')) roundCorrect++;
    });
    const roundPts = roundCorrect * 3;
    const roundPct = roundPicked ? Math.round(roundCorrect / roundPicked * 100) : 0;

    html += `
      <div style="background:linear-gradient(135deg,#13132a,#0f0f22);border-radius:16px;border:1px solid #ffffff12;margin-bottom:14px;overflow:hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #ffffff08">
          <div>
            <div style="font-size:15px;font-weight:800">מחזור ${round}</div>
            <div style="font-size:11px;color:#ffffff44;margin-top:2px">${roundCorrect}/${rGames.length} נכונים · ${roundPct}% הצלחה</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:20px;font-weight:900;color:${roundPts>0?'#ffd700':'#ffffff44'}">${roundPts}</div>
            <div style="font-size:10px;color:#ffffff44;font-weight:600">נקודות</div>
          </div>
        </div>
        <div style="padding:10px 12px">`;

    [...rGames].sort((a, b) => {
      const da = new Date((a.date || '1970-01-01') + 'T' + (a.time || '23:59'));
      const db = new Date((b.date || '1970-01-01') + 'T' + (b.time || '23:59'));
      return db - da;
    }).forEach(g => {
      const home = getTeam(g.home), away = getTeam(g.away);
      const pick = predictions[g.id];
      const winner = g.hs > g.as ? 'home' : 'away';
      const ok = pick && pick === winner;
      const wrong = pick && pick !== winner;
      html += `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 4px;border-bottom:1px solid #ffffff06">
          <span style="color:#ffffffbb;font-size:12px">${home.short} <span style="color:#ffffff33">${g.hs}–${g.as}</span> ${away.short}</span>
          <span style="font-size:12px;font-weight:700;color:${ok?'#22c55e':wrong?'#f87171':'#ffffff33'}">
            ${pick ? (ok?'✅ ':wrong?'❌ ':'') + (pick==='home'?home.short:away.short) : '—'}
          </span>
        </div>`;
    });

    html += `</div></div>`;
  });

  return html;
}

// ─── LEADERS ─────────────────────────────────────────────────────────────────
function renderLeaders() {
  const medals = ['🥇','🥈','🥉'];
  let html = '<div class="section-label">🏆 לוח מובילים</div>';

  if (leaderboard.length === 0) {
    html += '<div class="loading-spinner"><div class="spinner"></div>טוען...</div>';
  } else {
    const finishedCount = GAMES.filter(g => g.status === 'finished').length;

    // מיון: קודם לפי נקודות, שוויון — לפי אחוז הצלחה
    const sorted = [...leaderboard].sort((a, b) => {
      const ptsDiff = (b.points||0) - (a.points||0);
      if (ptsDiff !== 0) return ptsDiff;
      const aPct = (a.correct||0) / Math.max(a.totalPicked||a.correct||1, 1);
      const bPct = (b.correct||0) / Math.max(b.totalPicked||b.correct||1, 1);
      return bPct - aPct;
    });

    sorted.forEach((u, i) => {
      const isMe = currentUser && u.id === currentUser.id;
      const rank = i < 3 ? medals[i] : `#${i+1}`;
      const pc = i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':isMe?'#3b82f6':'#ffffffcc';
      const pct = finishedCount ? Math.round((u.correct||0) / finishedCount * 100) : 0;
      const barColor = pct>=70?'#22c55e':pct>=40?'#ffd700':'#f87171';

      html += `
        <div class="leader-row ${isMe?'me':''}" onclick="openUserModal('${u.id}')" style="cursor:pointer;flex-direction:column;align-items:stretch;gap:8px">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="leader-rank">${rank}</div>
            <div class="leader-avatar">${u.avatar || '🏀'}</div>
            <div class="leader-info">
              <div class="leader-name">${u.name}${isMe?' (אני)':''}</div>
              <div class="leader-sub">${u.correct||0}/${finishedCount} נכונים · ${pct}% הצלחה</div>
            </div>
            <div class="leader-pts-val" style="color:${pc}">${u.points||0}<span class="leader-pts-lbl">נק'</span></div>
          </div>
          <div style="height:4px;background:#ffffff10;border-radius:4px;overflow:hidden;margin:0 4px">
            <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width 0.6s ease"></div>
          </div>
        </div>`;
    });
  }

  html += `<div class="invite-box">
    <div class="invite-title">📨 הזמן חברים</div>
    <div class="invite-sub">שתף את הקישור ותתחרה עם חברים!</div>
    <button class="invite-btn" onclick="copyLink()">📋 העתק קישור</button>
  </div>`;
  return html;
}

function openUserModal(userId) {
  const u = leaderboard.find(x => x.id === userId);
  if (!u) return;
  const preds = u.predictions || {};
  const isMe = currentUser && u.id === currentUser.id;
  const medals = ['🥇','🥈','🥉'];
  const rank = leaderboard.indexOf(u);
  const rankLabel = rank < 3 ? medals[rank] : `#${rank+1}`;

  let html = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div style="font-size:42px">${u.avatar || '🏀'}</div>
      <div>
        <div style="font-size:18px;font-weight:800">${u.name}${isMe?' (אני)':''}</div>
        <div style="font-size:13px;color:#ffffff66;margin-top:3px">${rankLabel} · ${u.points || 0} נקודות · ${u.correct || 0} נכונים</div>
      </div>
    </div>
    <div class="section-label" style="margin-bottom:12px">🎯 ניחושים — מחזור ${activeRound}</div>`;

  const upcomingGames = GAMES.filter(g => g.round === activeRound && g.status === 'upcoming');
  const finishedGames = GAMES.filter(g => g.round === activeRound && g.status === 'finished');
  const allGames = [...finishedGames, ...upcomingGames];

  if (allGames.length === 0) {
    html += '<div style="text-align:center;color:#ffffff33;padding:20px">אין משחקים</div>';
  } else {
    allGames.forEach(g => {
      const home = getTeam(g.home), away = getTeam(g.away);
      const pick = preds[g.id];
      const isFinished = g.status === 'finished';
      const winner = isFinished ? (g.hs > g.as ? 'home' : 'away') : null;
      const ok = pick && isFinished && pick === winner;
      const wrong = pick && isFinished && pick !== winner;

      let pickColor = '#ffffff33';
      let pickIcon = '—';
      if (pick === 'home') pickIcon = home.short;
      else if (pick === 'away') pickIcon = away.short;

      if (ok) pickColor = '#22c55e';
      else if (wrong) pickColor = '#f87171';
      else if (pick) pickColor = '#ffd700aa';

      const resultStr = isFinished ? `${g.hs}–${g.as}` : '';

      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;border:1px solid ${ok?'#22c55e33':wrong?'#f8717133':'#ffffff10'};background:#ffffff05;margin-bottom:8px">
        <span style="color:#ffffffcc;font-size:13px">${home.short} נגד ${away.short}${resultStr?' · '+resultStr:''}</span>
        <span style="color:${pickColor};font-size:13px;font-weight:700">
          ${pick ? (ok?'✅ ':wrong?'❌ ':'🎯 ')+pickIcon : '—'}
        </span>
      </div>`;
    });
  }

  document.getElementById('userModalContent').innerHTML = html;
  const modal = document.getElementById('userModal');
  modal.style.display = 'flex';
  requestAnimationFrame(() => { modal.style.opacity = '1'; });
}

function closeUserModal(e) {
  if (e && e.target !== document.getElementById('userModal')) return;
  document.getElementById('userModal').style.display = 'none';
}

function copyLink() {
  if (navigator.clipboard) navigator.clipboard.writeText(window.location.href);
  showToast('📋 הקישור הועתק!', '#3b82f6');
}

function matchTeamName(name) {
  if (!name) return null;
  const lower = name.toLowerCase().trim();
  for (const [key, id] of Object.entries(TEAM_NAME_MAP)) {
    if (lower.includes(key) || key.includes(lower)) return id;
  }
  return null;
}

async function fetchApiGames() {
  const resultEl = document.getElementById('apiImportResult');
  const roundInput = document.getElementById('apiRoundNum');
  apiImportRoundNum = parseInt(roundInput?.value) || (GAMES.length ? Math.max(...GAMES.map(g=>g.round))+1 : 1);

  resultEl.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px;color:#ffffff55;font-size:13px">
      <div class="spinner"></div>
      <span>שולף משחקים מ-TheSportsDB...</span>
    </div>`;

  try {
    const leagueId = '4474';
    const season = '2025-2026';

    // שולפים ישירות את הסיבוב שהמשתמש בחר
    const targetRound = apiImportRoundNum;
    const url = `https://www.thesportsdb.com/api/v1/json/3/eventsround.php?id=${leagueId}&r=${targetRound}&s=${season}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (!data.events || !data.events.length) {
      resultEl.innerHTML = `<div style="text-align:center;color:#f87171;padding:20px">לא נמצאו משחקים במחזור ${targetRound}</div>`;
      return;
    }

    const weekGames = data.events;

    if (!weekGames.length) {
      resultEl.innerHTML = `<div style="text-align:center;color:#f59e0b;padding:24px;line-height:1.8">⚠️ אין משחקים במחזור ${targetRound}<br><span style="font-size:11px;color:#ffffff33">בדוק שמספר הסיבוב נכון</span></div>`;
      return;
    }

    // עדכון שדה מספר הסיבוב בממשק
    const roundInput = document.getElementById('apiRoundNum');
    if (roundInput) roundInput.value = targetRound;
    apiImportRoundNum = targetRound;

    // התאמת קבוצות
    apiImportPreview = weekGames.map(ev => {
      const homeId = matchTeamName(ev.strHomeTeam);
      const awayId = matchTeamName(ev.strAwayTeam);
      return {
        homeRaw: ev.strHomeTeam,
        awayRaw: ev.strAwayTeam,
        homeId,
        awayId,
        date: ev.dateEvent,
        time: ev.strTime || '',
        matched: !!(homeId && awayId),
      };
    });

    renderApiPreview(resultEl);

  } catch(err) {
    console.error(err);
    resultEl.innerHTML = `<div style="text-align:center;color:#f87171;padding:20px">שגיאה בשליפה: ${err.message}</div>`;
  }
}

    if (as && g.awayId) as.value = g.awayId;
  });

function updateApiGame(idx, field, val) {
  apiImportPreview[idx][field] = val ? parseInt(val) : null;
  apiImportPreview[idx].matched = !!(apiImportPreview[idx].homeId && apiImportPreview[idx].awayId);
  renderApiPreview(document.getElementById('apiImportResult'));
}

async function saveApiImport() {
  if (!window._db) return;
  const valid = apiImportPreview.filter(g => g.homeId && g.awayId);
  if (!valid.length) { showToast('⚠️ אין משחקים תקינים לשמירה', '#f59e0b'); return; }

  const maxId = GAMES.length ? Math.max(...GAMES.map(g => g.id)) : 0;
  try {
    const saves = valid.map((g, i) => {
      const gameId = maxId + i + 1;
      return window._fsSetDoc(window._fsDoc(window._db, 'games', String(gameId)), {
        id: gameId, home: g.homeId, away: g.awayId,
        round: apiImportRoundNum, status: 'upcoming',
        hs: 0, as: 0,
        date: g.date || '',
        time: g.time || '',
        updatedAt: Date.now()
      });
    });
    await Promise.all(saves);
    showToast(`✅ מחזור ${apiImportRoundNum} נוצר עם ${valid.length} משחקים!`, '#22c55e');
    adminTab = 'results';
    renderAdminContent();
  } catch(e) {
    console.error(e);
    showToast('שגיאה בשמירה', '#f87171');
  }
}

async function updateAllDates(btn) {
  const resultEl = document.getElementById('updateDatesResult');
  btn.disabled = true;
  btn.textContent = '⏳ שולף...';

  const leagueId = '4474';
  const season = '2025-2026';

  try {
    // שולפים את כל הסיבובים הקיימים במשחקים
    const rounds = [...new Set(GAMES.map(g => g.round))];

    resultEl.innerHTML = `<div style="text-align:center;color:#ffffff55;font-size:13px;padding:12px">שולף ${rounds.length} סיבובים (${Math.min(...rounds)}–${Math.max(...rounds)})...</div>`;

    // שליפה מקבילה של כל הסיבובים
    const fetches = rounds.map(r =>
      fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsround.php?id=${leagueId}&r=${r}&s=${season}`)
        .then(res => res.json())
        .catch(() => ({ events: [] }))
    );
    const results = await Promise.all(fetches);
    const allEvents = results.flatMap(r => r.events || []);

    let updated = 0, notFound = 0;
    const saves = [];

    GAMES.forEach(game => {
      const hasDate = game.date && game.date !== 'undefined' && game.date !== '';
      if (hasDate) return;
      const ev = allEvents.find(e => {
        const homeId = matchTeamName(e.strHomeTeam);
        const awayId = matchTeamName(e.strAwayTeam);
        return homeId === game.home && awayId === game.away;
      });
      if (!ev) { notFound++; return; }
      updated++;
      saves.push(
        window._fsSetDoc(window._fsDoc(window._db, 'games', String(game.id)), {
          ...game,
          date: ev.dateEvent || '',
          time: ev.strTime || '',
          updatedAt: Date.now()
        })
      );
    });

    await Promise.all(saves);

    resultEl.innerHTML = `
      <div style="background:#22c55e18;border:1px solid #22c55e44;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:16px;font-weight:900;color:#22c55e;margin-bottom:4px">✅ עודכנו ${updated} משחקים</div>
        ${notFound ? `<div style="font-size:12px;color:#f59e0b">${notFound} משחקים לא נמצאו ב-API</div>` : ''}
      </div>`;
    showToast(`✅ עודכנו ${updated} משחקים עם תאריכים!`, '#22c55e');
    btn.textContent = '📅 שלוף ועדכן תאריכים';
    btn.disabled = false;

  } catch(err) {
    console.error(err);
    resultEl.innerHTML = `<div style="text-align:center;color:#f87171;padding:16px">שגיאה: ${err.message}</div>`;
    btn.textContent = '📅 שלוף ועדכן תאריכים';
    btn.disabled = false;
  }
}

async function saveEditGameTeams(gameId, btn) {

    await window._fsUpdateDoc(window._fsDoc(window._db, 'games', String(gameId)), { home: newHome, away: newAway });

    render();

async function saveNewRound() {
  if (!window._db) return;
  const roundNum = parseInt(document.getElementById('newRoundNum').value);
  if (!roundNum || roundNum < 1) { showToast('⚠️ מספר מחזור לא תקין', '#f59e0b'); return; }
  if (!newRoundGames.length) { showToast('⚠️ הוסף לפחות משחק אחד', '#f59e0b'); return; }

  // בדיקת כפילויות
  for (const g of newRoundGames) {
    if (g.home === g.away) { showToast('⚠️ קבוצה לא יכולה לשחק נגד עצמה', '#f59e0b'); return; }
  }

  // מציאת ה-id הגבוה ביותר
  const maxId = GAMES.length ? Math.max(...GAMES.map(g=>g.id)) : 0;

  try {
    const saves = newRoundGames.map((g, i) => {
      const gameId = maxId + i + 1;
      return window._fsSetDoc(window._fsDoc(window._db, 'games', String(gameId)), {
        id: gameId, home: g.home, away: g.away, round: roundNum,
        status: 'upcoming', hs: 0, as: 0, updatedAt: Date.now()
      });
    });
    await Promise.all(saves);
    showToast(`✅ מחזור ${roundNum} נוצר עם ${newRoundGames.length} משחקים!`, '#22c55e');
    adminTab = 'results';
    renderAdminContent();
  } catch(e) {
    console.error(e);
    showToast('שגיאה בשמירה', '#f87171');
  }
}

async function mergeUsers(mainId, duplicateIds) {
  if (!duplicateIds.length) return;
  const names = duplicateIds.map(id => leaderboard.find(u=>u.id===id)?.name).filter(Boolean).join(', ');
  if (!confirm(`למזג את "${names}" לתוך המשתמש הראשי?\nהניחושים והנקודות יועברו, והכפולים יימחקו.`)) return;

  try {
    const mainUser = leaderboard.find(u => u.id === mainId);
    if (!mainUser) { showToast('משתמש ראשי לא נמצא', '#f87171'); return; }

    for (const dupId of duplicateIds) {
      const dupUser = leaderboard.find(u => u.id === dupId);
      if (!dupUser) continue;

      // מיזוג נקודות, נכונים, ניחושים
      const mergedPoints  = (mainUser.points||0)  + (dupUser.points||0);
      const mergedCorrect = (mainUser.correct||0) + (dupUser.correct||0);
      const mergedPicked  = (mainUser.totalPicked||0) + (dupUser.totalPicked||0);

      // מיזוג ניחושים — ניחושי הראשי מנצחים בקונפליקט
      const mergedPreds = { ...(dupUser.predictions||{}), ...(mainUser.predictions||{}) };
      const mergedSubmitted = { ...(dupUser.submitted||{}), ...(mainUser.submitted||{}) };

      // עדכון משתמש ראשי
      await window._fsSetDoc(window._fsDoc(window._db, 'users', mainId), {
        ...mainUser,
        points: mergedPoints,
        correct: mergedCorrect,
        totalPicked: mergedPicked,
        predictions: mergedPreds,
        submitted: mergedSubmitted,
        updatedAt: Date.now()
      });

      // מחיקת הכפול
      await window._fsDeleteDoc(window._fsDoc(window._db, 'users', dupId));
    }

    showToast('✅ המיזוג הושלם!', '#22c55e');
    await loadMyDataFromFirebase();
    renderAdminContent();
  } catch(e) {
    console.error(e);
    showToast('שגיאה במיזוג: ' + e.message, '#f87171');
  }
}

async function addBonusToAll() {
  const pts = parseInt(document.getElementById('bonusAmt').value);
  if (!pts || pts < 1) { showToast('הכנס מספר תקין', '#f87171'); return; }
  const reason = document.getElementById('bonusReason').value.trim();
  const addCorrect = document.getElementById('bonusAddCorrect').checked;
  const correctCount = addCorrect ? parseInt(document.getElementById('bonusCorrectCount').value || '1') : 0;
  const msg = `להוסיף ${pts} נקודות ל-${leaderboard.length} משתמשים?` +
    (addCorrect ? `
גם +${correctCount} ניחושים נכונים` : '') +

סיבה: ${reason}` : '');
  if (!confirm(msg)) return;

    }

async function addPredictionToAll(gameId, winningSide) {
  const game = GAMES.find(g => g.id === gameId);
  if (!game) { showToast('משחק לא נמצא', '#f87171'); return; }
  const winnerTeam = getTeam(winningSide === 'home' ? game.home : game.away);
  if (!confirm(`לעדכן ניחוש על ${winnerTeam.short} ל-${leaderboard.length} משתמשים?\n(מחליף ניחוש קיים אם היה שגוי)`)) return;
  try {
    let added = 0, fixed = 0;
    for (const u of leaderboard) {
      const preds = u.predictions || {};
      const existing = preds[gameId];
      const newPreds = { ...preds, [gameId]: winningSide };
      let pointsDelta = 0, correctDelta = 0;
      if (!existing) {
        // No prediction — add correct one + points
        pointsDelta = 3; correctDelta = 1; added++;
      } else if (existing !== winningSide) {
        // Wrong prediction — fix it + add points
        pointsDelta = 3; correctDelta = 1; fixed++;
      } else {
        continue; // Already correct, skip
      }
      await window._fsUpdateDoc(window._fsDoc(window._db, 'users', u.id), {
        predictions: newPreds,
        points: (u.points||0) + pointsDelta,
        correct: (u.correct||0) + correctDelta
      });
    }
    showToast(`✅ נוסף ל-${added} | תוקן ל-${fixed} משתמשים`, '#22c55e');
    await loadMyDataFromFirebase();
    renderAdminContent();
  } catch(e) {
    showToast('שגיאה: ' + e.message, '#f87171');
  }
}

function syncRoundInput(val) {

function updateDeleteRoundPreview(round) {
  const preview = document.getElementById('deleteRoundPreview');
  if (!preview) return;
  if (!round || isNaN(round)) { preview.textContent = ''; return; }
  const localGames = GAMES.filter(g => g.round === round);
  if (localGames.length > 0) {
    preview.innerHTML = `<span style="color:#f59e0b">⚠️ נמצאו ${localGames.length} משחקים במחזור ${round} במטמון המקומי</span>`;
  } else {
    preview.innerHTML = `<span style="color:#ffffff44">מחזור ${round} לא נמצא במטמון — ישאב ישירות מ-Firebase</span>`;
  }
}

async function deleteRoundByInput() {
  const input = document.getElementById('deleteRoundInput');
  const round = parseInt(input?.value);
  if (!round || round < 1) { showToast('⚠️ הכנס מספר מחזור תקין', '#f59e0b'); return; }

  const preview = document.getElementById('deleteRoundPreview');
  if (preview) preview.innerHTML = `<span style="color:#ffffff55">⏳ שואב נתונים מ-Firebase...</span>`;

  try {
    const { getDocs, query, where } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const q = query(window._fsCollection(window._db, 'games'), where('round', '==', round));
    const snap = await getDocs(q);

    const count = snap.size;
    if (count === 0) {
      showToast(`⚠️ לא נמצאו משחקים במחזור ${round}`, '#f59e0b');
      if (preview) preview.innerHTML = `<span style="color:#f59e0b">לא נמצאו משחקים במחזור ${round} ב-Firebase</span>`;
      return;
    }

    if (!confirm(`למחוק את מחזור ${round} עם ${count} משחקים?\nהפעולה בלתי הפיכה.`)) {
      if (preview) preview.innerHTML = '';
      return;
    }

    await Promise.all(snap.docs.map(d =>
      window._fsDeleteDoc(window._fsDoc(window._db, 'games', d.id))
    ));

    showToast(`✅ מחזור ${round} נמחק (${count} משחקים)`, '#22c55e');
    await loadGamesFromFirebase();
    renderAdminContent();
  } catch(e) {
    console.error(e);
    showToast('שגיאה במחיקה: ' + e.message, '#f87171');
    if (preview) preview.innerHTML = `<span style="color:#f87171">שגיאה: ${e.message}</span>`;
  }
}

async function saveGameResult(gameId) {
  const hs = parseInt(document.getElementById(`hs-${gameId}`).value);
  const as = parseInt(document.getElementById(`as-${gameId}`).value);

  if (isNaN(hs) || isNaN(as)) {
    showToast('⚠️ הכנס תוצאה תקינה', '#f59e0b'); return;
  }

  const g = GAMES.find(x => x.id === gameId);
  if (!g) return;

  // שמירה ב-Firebase — listenGames יעדכן GAMES אוטומטית
  if (window._db) {
    try {
      await window._fsSetDoc(window._fsDoc(window._db, 'games', String(gameId)), {
        ...g, hs, as, status: 'finished', updatedAt: Date.now()
      });
    } catch(e) { console.error(e); showToast('שגיאה בשמירה', '#f87171'); return; }
  }

  // עדכון ניקוד לכל המשתמשים (עם התוצאה החדשה)
  const updatedGames = GAMES.map(x => x.id===gameId ? {...x, hs, as, status:'finished'} : x);
  await recalcAllUsersPoints(updatedGames);

  showToast(`✅ תוצאה נשמרה! ${hs}–${as}`, '#22c55e');
  renderAdminContent();
}

async function recalcAllUsersPoints(gamesList) {
  if (!window._db) return;
  const games = gamesList || GAMES;
  const db = window._db;
  try {
    const snap = await new Promise(resolve => {
      const unsub = window._fsOnSnapshot(window._fsCollection(db, 'users'), s => { unsub(); resolve(s); });
    });
    const updates = snap.docs.map(async docSnap => {
      const data = docSnap.data();
      const preds = data.predictions || {};
      let correct = 0;
      games.filter(g => g.status === 'finished').forEach(g => {
        const pick = preds[g.id];
        if (!pick) return;
        const winner = g.hs > g.as ? 'home' : 'away';
        if (pick === winner) correct++;
      });
      await window._fsSetDoc(window._fsDoc(db, 'users', docSnap.id), {
        ...data, correct, points: correct * 3, updatedAt: Date.now()
      });
    });
    await Promise.all(updates);
  } catch(e) { console.error(e); }
}

// טעינת משחקים מ-Firebase — האזנה בזמן אמת
function listenGames() {
  if (!window._db) return;
  window._fsOnSnapshot(window._fsCollection(window._db, 'games'), snap => {
    const loaded = snap.docs.map(d => d.data());
    // מיזוג: שמירת סדר לפי round ואז id
    GAMES = loaded.sort((a,b) => a.round!==b.round ? a.round-b.round : a.id-b.id);
    liveGames = GAMES.map(g => ({...g}));
    // activeRound — הגדרה אוטומטית למחזור האחרון
    const rounds = getRounds();
    if (rounds.length && (activeRound === null || !rounds.includes(activeRound))) {
      activeRound = rounds[rounds.length - 1];
    }
    render();
  });
}

async function loadGamesFromFirebase() {
  if (!window._db) return;
  await new Promise(resolve => {
    const unsub = window._fsOnSnapshot(window._fsCollection(window._db, 'games'), snap => {
      unsub();
      const loaded = snap.docs.map(d => d.data());
      GAMES = loaded.sort((a,b) => a.round!==b.round ? a.round-b.round : a.id-b.id);
      liveGames = GAMES.map(g => ({...g}));
      const rounds = getRounds();
      if (rounds.length) activeRound = rounds[rounds.length - 1];
      resolve();
    });
  });
  // המשך האזנה בזמן אמת
  listenGames();
}

// ─── LIVE UPDATES מ-TheSportsDB (רענון כל 2 דקות) ───────────────────────────
let liveRefreshInterval = null;
let lastLiveRefresh = null;

async function fetchLiveScores() {
  try {
    const leagueId = '4474';
    const today = new Date().toISOString().split('T')[0];

    // שליפת תוצאות היום
    const url = `https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${today}&l=${leagueId}`;
    const resp = await fetch(url);
    const data = await resp.json();

    lastLiveRefresh = new Date();
    updateLiveRefreshLabel();

    // מציאת משחקים שיש להם תאריך ועדיין לא סיימו — כולל ימים קודמים
    const pendingGames = GAMES.filter(g => g.status !== 'finished' && g.date);

    // קיבוץ לפי תאריך — שליפה נפרדת לכל תאריך שאינו היום
    const pastDates = [...new Set(
      pendingGames
        .filter(g => g.date < today)
        .map(g => g.date)
    )];

    // שליפות נוספות לתאריכים שעברו
    const extraFetches = pastDates.map(d =>
      fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d=${d}&l=${leagueId}`)
        .then(r => r.json())
        .catch(() => ({ events: [] }))
    );
    const extraResults = await Promise.all(extraFetches);

    // מיזוג כל האירועים
    const allEvents = [
      ...(data.events || []),
      ...extraResults.flatMap(r => r.events || [])
    ];

    if (!allEvents.length) { if (currentTab === 'live') render(); return; }

    let anyUpdate = false;

    allEvents.forEach(ev => {
      const homeId = matchTeamName(ev.strHomeTeam);
      const awayId = matchTeamName(ev.strAwayTeam);
      if (!homeId || !awayId) return;

      const game = GAMES.find(g => g.home === homeId && g.away === awayId);
      if (!game) return;

      const hs = parseInt(ev.intHomeScore) || 0;
      const as = parseInt(ev.intAwayScore) || 0;
      const finishedStatuses = ['match finished', 'ft', 'ap', 'aet', 'finished', 'ended', 'final'];
      const finished = finishedStatuses.includes((ev.strStatus || '').toLowerCase()) ||
                       finishedStatuses.includes((ev.strProgress || '').toLowerCase()) ||
                       (ev.intHomeScore !== null && ev.intHomeScore !== '' && ev.strStatus === '');
      const isLive   = ev.strStatus === 'Match Running' ||
                       (ev.strProgress && ev.strProgress !== '' && !finished);

      const li = liveGames.findIndex(g => g.id === game.id);
      if (li === -1) return;

      const prev = liveGames[li];
      const newStatus = finished ? 'finished' : isLive ? 'live' : game.status;
      const quarter   = ev.strProgress || prev.q || '';

      // אנימציית flash רק בלשונית חי
      if (currentTab === 'live') {
        if (hs !== prev.hs) {
          const el = document.getElementById(`live-hs-${game.id}`);
          if (el) { el.textContent = hs; el.classList.add('flash'); setTimeout(() => el && el.classList.remove('flash'), 600); }
        }
        if (as !== prev.as) {
          const el = document.getElementById(`live-as-${game.id}`);
          if (el) { el.textContent = as; el.classList.add('flash'); setTimeout(() => el && el.classList.remove('flash'), 600); }
        }
      }

      liveGames[li] = { ...prev, hs, as, status: newStatus, q: quarter, clk: ev.strProgress || '' };
      anyUpdate = true;

      // אם הסתיים ועדיין לא עודכן — שמור ב-Firebase ועדכן ניקוד
      if (finished && game.status !== 'finished') {
        window._fsSetDoc(window._fsDoc(window._db, 'games', String(game.id)), {
          ...game, hs, as, status: 'finished', updatedAt: Date.now()
        }).then(() => {
          showToast(`✅ ${getTeam(homeId).short} ${hs}–${as} ${getTeam(awayId).short} — תוצאה נקלטה אוטומטית!`, '#22c55e');
          recalcAllUsersPoints();
        }).catch(console.error);
      }
    });

    if (currentTab === 'live') render();

  } catch(err) {
    console.error('Live fetch error:', err);
    if (currentTab === 'live') render(); // render even on error so Firebase data shows
  }
}

// מחשב מרחק עריכה (Levenshtein) בין שני מחרוזות
function levenshtein(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

let _regAllUsers = []; // שמות קיימים — נטענים פעם אחת

async function checkSimilarNames(name) {
  const warningEl = document.getElementById('similarNameWarning');
  if (!warningEl) return;
  if (name.length < 2) { warningEl.style.display = 'none'; return; }

  // טעינה חד-פעמית של רשימת המשתמשים
  if (!_regAllUsers.length && window._db) {
    try {
      const snap = await new Promise(resolve => {
        const unsub = window._fsOnSnapshot(window._fsCollection(window._db, 'users'), s => { unsub(); resolve(s); });
      });
      _regAllUsers = snap.docs.map(d => d.data().name || '');
    } catch(e) { return; }
  }

  // חיפוש שמות דומים (לא זהים בדיוק — אלה יטופלו בהרשמה)
  const exact = _regAllUsers.find(n => n.trim().toLowerCase() === name.toLowerCase());
  if (exact) {
    warningEl.innerHTML = `✅ הכינוי "<strong>${exact}</strong>" כבר קיים — תתחבר אוטומטית לחשבון שלו!`;
    warningEl.style.background = '#22c55e18';
    warningEl.style.borderColor = '#22c55e55';
    warningEl.style.color = '#22c55e';
    warningEl.style.display = 'block';
    return;
  }

  const similar = _regAllUsers.filter(n => {
    const dist = levenshtein(name, n.trim());
    const maxLen = Math.max(name.length, n.trim().length);
    return dist > 0 && dist <= Math.max(1, Math.floor(maxLen * 0.35));
  });

  if (similar.length) {
    warningEl.innerHTML = `⚠️ שם דומה כבר קיים: <strong>${similar.join(', ')}</strong><br><span style="font-size:11px;opacity:0.8">אם זה אתה — כתוב את השם בדיוק כפי שנרשמת.</span>`;
    warningEl.style.background = '#f59e0b18';
    warningEl.style.borderColor = '#f59e0b55';
    warningEl.style.color = '#f59e0b';
    warningEl.style.display = 'block';
  } else {
    warningEl.style.display = 'none';
  }
}
function checkRegReady() {
  const name = document.getElementById('nicknameInput').value.trim();
  const btn = document.getElementById('regBtn');
  const ok = name.length>=2 && pickedAvatar!=='';
  btn.disabled = !ok; btn.style.opacity = ok?'1':'0.35';
}

async function registerUser() {
  const name = document.getElementById('nicknameInput').value.trim();
  if (!name || !pickedAvatar) return;

  const btn = document.getElementById('regBtn');
  const input = document.getElementById('nicknameInput');
  btn.textContent = '⏳ בודק...';
  btn.disabled = true;

  try {
    // בדיקה אם הכינוי כבר קיים
    if (window._db) {
      const snap = await new Promise(resolve => {
        const unsub = window._fsOnSnapshot(window._fsCollection(window._db, 'users'), s => { unsub(); resolve(s); });
      });
      const existingDoc = snap.docs.find(d => (d.data().name || '').trim().toLowerCase() === name.toLowerCase());
      if (existingDoc) {
        // כינוי קיים — מתחברים כמשתמש הקיים
        const existingData = existingDoc.data();
        const newAvatar = pickedAvatar || existingData.avatar || '🏀';
        currentUser = { id: existingDoc.id, name: existingData.name, avatar: newAvatar };
        localStorage.setItem('winnerId', existingDoc.id);
        localStorage.setItem('winnerName', existingData.name);
        localStorage.setItem('winnerAvatar', newAvatar);
        await loadMyDataFromFirebase();
        // עדכון אמוג'י ב-Firebase אם השתנה
        if (newAvatar !== existingData.avatar) {
          await window._fsSetDoc(window._fsDoc(window._db, 'users', existingDoc.id), { avatar: newAvatar }, { merge: true });
        }
        listenLeaderboard();
        document.getElementById('regOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        showToast(`ברוך הבא בחזרה, ${existingData.name}! 🎉`);
        render();
        return;
      }
    }

    // כינוי פנוי — נרשמים
    const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    currentUser = { id: userId, name, avatar: pickedAvatar };
    localStorage.setItem('winnerId', userId);
    localStorage.setItem('winnerName', name);
    localStorage.setItem('winnerAvatar', pickedAvatar);
    await loadMyDataFromFirebase();
    await savePredictionsToFirebase();
    listenLeaderboard();

    document.getElementById('regOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    showToast(`ברוך הבא, ${name}! 🎉`);
    render();

  } catch (err) {
    console.error(err);
    showToast('שגיאת חיבור, נסה שוב', '#f87171');
    btn.textContent = 'בואו נשחק! 🎯';
    btn.disabled = false;
  }
}

async function tryAutoLogin() {
  const savedId     = localStorage.getItem('winnerId');
  const savedName   = localStorage.getItem('winnerName');
  const savedAvatar = localStorage.getItem('winnerAvatar');
  if (!savedId || !savedName) return false;

  // מחכים ש-Firebase יהיה מוכן
  if (!window._firebaseReady) {
    await new Promise(resolve => window.addEventListener('firebaseReady', resolve, { once: true }));
  }

  currentUser = { id: savedId, name: savedName, avatar: savedAvatar || '🏀' };
  await loadMyDataFromFirebase();
  listenLeaderboard();

  document.getElementById('regOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
  return true;
}

function doExit() {
  window.close();
  setTimeout(() => {
    if (!document.hidden) {
      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:inherit;text-align:center;padding:32px;';

        <div style="font-size:48px">🏀</div>
        <div style="font-size:18px;font-weight:800;color:#fff">כדי לצאת מהאפליקציה</div>
        <div style="font-size:14px;color:#ffffff88;line-height:1.8">לחץ על כפתור הבית<br>או סגור את הלשונית ידנית</div>
        <button onclick="this.parentElement.remove()" style="margin-top:8px;padding:12px 28px;border-radius:14px;border:1px solid #ffffff20;background:#ffffff10;color:#ffffffcc;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">חזרה לאפליקציה</button>`;
      document.body.appendChild(msg);
    }
  }, 400);
}

function showExitDialog() {
  if (document.getElementById('exitDialog')) {
    doExit();
    return;
  }
  const overlay = document.createElement('div');
  overlay.id = 'exitDialog';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#000000bb;display:flex;align-items:flex-end;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#13132a;border-radius:24px 24px 0 0;border:1px solid #ffffff15;width:100%;max-width:480px;padding:28px 24px 44px;text-align:center;animation:slideUpBox 0.25s ease">
      <div style="font-size:40px;margin-bottom:12px">🏀</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px">לחץ שוב פעם ליציאה</div>
      <div style="font-size:13px;color:#ffffff55;margin-bottom:28px">הניחושים שלך שמורים בענן 👍</div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button id="exitCancel" style="flex:1;padding:14px;border-radius:16px;border:1px solid #ffffff20;background:#ffffff08;color:#ffffffcc;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">ביטול</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('exitCancel').onclick = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  setTimeout(() => { if (document.getElementById('exitDialog')) overlay.remove(); }, 3000);
}
