<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כיסאות מוזיקליים פוליטיים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Secular+One&family=Heebo:wght@400;700;900&display=swap');

  :root {
    --gold: #FFD700;
    --red: #CC0000;
    --blue: #003087;
    --dark: #0a0a0a;
    --light: #f5f0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--light);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 50%, #1a0a00 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, #00001a 0%, transparent 60%);
  }

  h1 {
    font-family: 'Secular One', sans-serif;
    text-align: center;
    font-size: clamp(1.4rem, 5vw, 2.5rem);
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    padding: 16px;
    letter-spacing: 2px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; padding: 12px; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ===== SETUP SCREEN ===== */
  .trump-host {
    text-align: center;
    margin: 8px 0 16px;
  }
  .trump-host img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: cover;
    box-shadow: 0 0 30px rgba(255,215,0,0.4);
  }
  .trump-host p {
    color: var(--gold);
    font-weight: 700;
    font-size: 1rem;
    margin-top: 6px;
  }

  .mode-btns {
    display: flex;
    gap: 10px;
    margin: 16px 0;
  }
  .mode-btn {
    flex: 1;
    padding: 14px 8px;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.selected, .mode-btn:hover {
    background: var(--gold);
    color: var(--dark);
  }

  .player-name-input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.1);
    border: 2px solid var(--gold);
    border-radius: 8px;
    color: white;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    text-align: right;
    margin: 6px 0;
  }
  .player-name-input::placeholder { color: rgba(255,255,255,0.4); }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), #FF8C00);
    color: var(--dark);
    font-family: 'Secular One', sans-serif;
    font-size: 1.3rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 4px 20px rgba(255,215,0,0.3);
    transition: transform 0.2s;
  }
  .start-btn:hover { transform: scale(1.02); }

  /* ===== GAME SCREEN ===== */
  .round-header {
    text-align: center;
    margin-bottom: 10px;
  }
  .round-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-family: 'Secular One', sans-serif;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 0.9rem;
  }
  .round-info {
    color: var(--gold);
    font-size: 0.85rem;
    margin-top: 4px;
  }

  /* Trump animation area */
  .trump-stage {
    text-align: center;
    padding: 10px 0;
    position: relative;
  }
  .trump-stage img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: cover;
  }
  .trump-stage img.playing {
    animation: trumpBounce 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 25px rgba(255,215,0,0.7);
  }
  @keyframes trumpBounce {
    from { transform: scale(1) rotate(-3deg); }
    to { transform: scale(1.08) rotate(3deg); }
  }

  .music-bar {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin: 8px 16px;
    overflow: hidden;
  }
  .music-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--red));
    border-radius: 3px;
    transition: width 0.3s;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Chairs row */
  .chairs-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
    margin: 8px 0;
  }
  .chair-icon {
    font-size: 1.6rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: transform 0.3s;
  }
  .chair-icon.taken { filter: grayscale(1) opacity(0.3); }

  /* Politicians circle */
  .politicians-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 10px 0;
  }
  .pol-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 70px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .pol-card img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .pol-card.moving img {
    animation: polMove 0.4s ease-in-out infinite alternate;
    border-color: var(--gold);
  }
  @keyframes polMove {
    from { transform: translateX(-4px) rotate(-5deg); }
    to { transform: translateX(4px) rotate(5deg); }
  }
  .pol-card.eliminated img {
    filter: grayscale(1) opacity(0.25);
    border-color: var(--red);
  }
  .pol-card span {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.2;
  }
  .pol-card.eliminated span { opacity: 0.3; }

  /* Guess section */
  .guess-section {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 12px;
    margin: 10px 0;
  }
  .guess-section h3 {
    color: var(--gold);
    font-size: 0.95rem;
    margin-bottom: 10px;
    text-align: center;
  }
  .guess-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .guess-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 6px 4px;
    width: 68px;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
    font-family: 'Heebo', sans-serif;
    font-size: 0.6rem;
  }
  .guess-btn img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
  }
  .guess-btn:hover, .guess-btn.selected {
    border-color: var(--gold);
    background: rgba(255,215,0,0.15);
    transform: scale(1.05);
  }
  .guess-btn.correct { border-color: #00cc44; background: rgba(0,204,68,0.2); }
  .guess-btn.wrong { border-color: var(--red); background: rgba(204,0,0,0.2); }

  .confirm-guess-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Secular One', sans-serif;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .confirm-guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Score bar */
  .scores-bar {
    display: flex;
    gap: 8px;
    margin: 8px 0;
  }
  .score-card {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .score-card .name { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
  .score-card .pts { font-size: 1.4rem; font-weight: 900; color: var(--gold); }

  /* Round result */
  .round-result {
    text-align: center;
    padding: 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    margin: 10px 0;
    display: none;
  }
  .round-result.show { display: block; }
  .result-icon { font-size: 3rem; }
  .result-text { font-size: 1.1rem; font-weight: 700; margin: 8px 0; }
  .result-who { color: var(--gold); font-size: 0.9rem; }

  .next-round-btn {
    margin-top: 12px;
    padding: 12px 24px;
    background: var(--blue);
    color: white;
    border: 2px solid var(--gold);
    font-family: 'Secular One', sans-serif;
    font-size: 1rem;
    border-radius: 8px;
    cursor: pointer;
  }

  /* ===== WINNER SCREEN ===== */
  #winnerScreen {
    text-align: center;
    padding: 20px 12px;
  }
  .winner-trump {
    font-size: 3rem;
    margin: 10px 0;
    animation: trumpCelebrate 0.8s ease-in-out infinite alternate;
  }
  @keyframes trumpCelebrate {
    from { transform: scale(1) rotate(-5deg); }
    to { transform: scale(1.15) rotate(5deg); }
  }
  .winner-pol img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid var(--gold);
    box-shadow: 0 0 40px rgba(255,215,0,0.6);
    animation: winnerGlow 1s ease-in-out infinite alternate;
  }
  @keyframes winnerGlow {
    from { box-shadow: 0 0 20px rgba(255,215,0,0.4); }
    to { box-shadow: 0 0 60px rgba(255,215,0,0.9); }
  }
  .winner-name {
    font-family: 'Secular One', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    margin: 12px 0 4px;
  }
  .winner-subtitle { color: rgba(255,255,255,0.6); font-size: 0.9rem; }

  .final-scores {
    margin: 20px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px;
  }
  .final-scores h3 { color: var(--gold); margin-bottom: 12px; }
  .final-score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.95rem;
  }
  .final-score-row:last-child { border-bottom: none; }
  .trophy { font-size: 1.2rem; }

  .play-again-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), #FF8C00);
    color: var(--dark);
    font-family: 'Secular One', sans-serif;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
  }

  .confetti {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 100vh;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .status-msg {
    text-align: center;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.7);
    min-height: 24px;
    margin: 4px 0;
  }

  /* player2 label */
  .player2-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen" class="screen active">
  <h1>🪑 כיסאות מוזיקליים פוליטיים</h1>
  
  <div class="trump-host">
    <img src="https://raw.githubusercontent.com/yaronzlot/primeminister/main/images/Trump.jpg" 
         onerror="this.style.fontSize='3rem';this.src=''" alt="Trump">
    <p>🎵 טראמפ המנחה 🎵</p>
  </div>

  <div style="margin-bottom:12px">
    <label style="color:var(--gold);font-size:0.9rem;display:block;margin-bottom:6px">מצב משחק:</label>
    <div class="mode-btns">
      <button class="mode-btn selected" onclick="selectMode('solo')" id="btnSolo">🤖 נגד מחשב</button>
      <button class="mode-btn" onclick="selectMode('multi')" id="btnMulti">👥 שני שחקנים</button>
    </div>
  </div>

  <input type="text" class="player-name-input" id="player1Name" placeholder="שם שחקן 1" value="שחקן 1">
  <div id="player2NameWrap" style="display:none">
    <input type="text" class="player-name-input" id="player2Name" placeholder="שם שחקן 2" value="שחקן 2">
  </div>

  <button class="start-btn" onclick="startGame()">▶ התחל משחק</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="round-header">
    <div class="round-badge" id="roundBadge">סיבוב 1</div>
    <div class="round-info" id="roundInfo">נותרו 10 פוליטיקאים, 9 כיסאות</div>
  </div>

  <div class="scores-bar" id="scoresBar"></div>

  <div class="trump-stage">
    <img id="trumpImg" src="https://raw.githubusercontent.com/yaronzlot/primeminister/main/images/Trump.jpg" alt="Trump">
    <div class="status-msg" id="statusMsg">טראמפ מנגן! הפוליטיקאים זזים...</div>
  </div>

  <div class="music-bar"><div class="music-fill" id="musicFill" style="width:100%"></div></div>

  <div class="chairs-row" id="chairsRow"></div>

  <div class="politicians-grid" id="polGrid"></div>

  <div class="guess-section" id="guessSection" style="display:none">
    <h3>🤔 מי יישאר בלי כסא?</h3>
    <div class="guess-grid" id="guessGrid"></div>
    <button class="confirm-guess-btn" id="confirmGuessBtn" disabled onclick="confirmGuess()">אשר ניחוש</button>
    <div id="p2GuessWrap" style="display:none; margin-top:10px;">
      <h3 id="p2GuessTitle" style="color:var(--gold);font-size:0.9rem;text-align:center;margin-bottom:8px"></h3>
      <div class="guess-grid" id="guessGrid2"></div>
      <button class="confirm-guess-btn" id="confirmGuessBtn2" disabled onclick="confirmGuess2()">אשר ניחוש</button>
    </div>
  </div>

  <div class="round-result" id="roundResult">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-text" id="resultText"></div>
    <div class="result-who" id="resultWho"></div>
    <button class="next-round-btn" onclick="nextRound()">סיבוב הבא ▶</button>
  </div>
</div>

<!-- WINNER SCREEN -->
<div id="winnerScreen" class="screen">
  <h1>🏆 ניצח!</h1>
  <div class="winner-trump">🎺</div>
  <div class="winner-pol">
    <img id="winnerImg" src="" alt="">
  </div>
  <div class="winner-name" id="winnerName"></div>
  <div class="winner-subtitle">ראש הממשלה!</div>
  
  <div class="final-scores" id="finalScores"></div>
  
  <button class="play-again-btn" onclick="playAgain()">🔄 משחק חדש</button>
</div>

<div class="confetti" id="confetti"></div>

<audio id="audioPlayer" loop></audio>

<script>
const POLITICIANS = [
  { id: 'Benet',    name: 'בנט' },
  { id: 'Bibi',     name: 'נתניהו' },
  { id: 'Derei',    name: 'דרעי' },
  { id: 'Gadi',     name: 'גדי איזנקוט' },
  { id: 'Gafny',    name: 'גפני' },
  { id: 'Golan',    name: 'גולן' },
  { id: 'Itamar',   name: 'בן גביר' },
  { id: 'Lapid',    name: 'לפיד' },
  { id: 'Liberman', name: 'ליברמן' },
  { id: 'Smotriz',  name: 'סמוטריץ\'' },
];

const IMG_BASE = 'https://raw.githubusercontent.com/yaronzlot/primeminister/main/images/';

// Music URLs (free, no CORS issues)
const GAME_MUSIC = 'https://upload.wikimedia.org/wikipedia/commons/2/2e/Hail_to_the_Chief_%28no_intro%29.ogg';
const WIN_MUSIC  = 'https://upload.wikimedia.org/wikipedia/commons/1/18/We_Are_the_Champions.ogg';

let gameMode = 'solo'; // 'solo' or 'multi'
let players = [];
let round = 0;
let remaining = [];
let eliminated = [];
let musicInterval = null;
let musicTime = 0;
let musicDuration = 0;
let phase = 'playing'; // playing | guessing | result
let playerGuess = null;
let player2Guess = null;
let p1GuessConfirmed = false;
let p2GuessConfirmed = false;
let loser = null;

function selectMode(m) {
  gameMode = m;
  document.getElementById('btnSolo').classList.toggle('selected', m === 'solo');
  document.getElementById('btnMulti').classList.toggle('selected', m === 'multi');
  document.getElementById('player2NameWrap').style.display = m === 'multi' ? 'block' : 'none';
}

function imgUrl(id) { return IMG_BASE + id + '.jpg'; }

function startGame() {
  const p1 = document.getElementById('player1Name').value.trim() || 'שחקן 1';
  const p2 = document.getElementById('player2Name').value.trim() || 'שחקן 2';

  players = [{ name: p1, score: 0 }];
  if (gameMode === 'multi') {
    players.push({ name: p2, score: 0 });
  } else {
    players.push({ name: '🤖 מחשב', score: 0, isAI: true });
  }

  remaining = [...POLITICIANS];
  eliminated = [];
  round = 0;

  showScreen('gameScreen');
  startRound();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startRound() {
  round++;
  phase = 'playing';
  playerGuess = null;
  player2Guess = null;
  p1GuessConfirmed = false;
  p2GuessConfirmed = false;
  loser = null;

  document.getElementById('roundResult').classList.remove('show');
  document.getElementById('guessSection').style.display = 'none';

  const chairs = remaining.length - 1;
  document.getElementById('roundBadge').textContent = `סיבוב ${round}`;
  document.getElementById('roundInfo').textContent = `נותרו ${remaining.length} פוליטיקאים, ${chairs} כיסאות`;

  renderScores();
  renderChairs();
  renderPoliticians(true);
  playMusic();

  // Random duration 3-6 seconds
  musicDuration = 3000 + Math.random() * 3000;
  musicTime = 0;

  const tick = 100;
  clearInterval(musicInterval);
  musicInterval = setInterval(() => {
    musicTime += tick;
    const pct = Math.max(0, 100 - (musicTime / musicDuration * 100));
    document.getElementById('musicFill').style.width = pct + '%';
    if (musicTime >= musicDuration) {
      clearInterval(musicInterval);
      stopMusic();
    }
  }, tick);

  document.getElementById('statusMsg').textContent = 'טראמפ מנגן! הפוליטיקאים זזים...';
  document.getElementById('trumpImg').classList.add('playing');
  document.querySelectorAll('.pol-card').forEach(c => c.classList.add('moving'));
}

function stopMusic() {
  pauseAudio();
  document.getElementById('trumpImg').classList.remove('playing');
  document.querySelectorAll('.pol-card').forEach(c => c.classList.remove('moving'));
  document.getElementById('musicFill').style.width = '0%';
  document.getElementById('statusMsg').textContent = 'המוזיקה עצרה! מי נשאר בלי כסא?';
  
  // Pick random loser
  loser = remaining[Math.floor(Math.random() * remaining.length)];

  phase = 'guessing';
  showGuessSection();
}

function showGuessSection() {
  const gs = document.getElementById('guessSection');
  gs.style.display = 'block';

  // Build guess grid for player 1
  buildGuessGrid('guessGrid', 1);

  // Player 2 / AI
  const p2 = players[1];
  if (p2.isAI) {
    // AI guesses randomly after short delay
    setTimeout(() => {
      player2Guess = remaining[Math.floor(Math.random() * remaining.length)];
      p2GuessConfirmed = true;
      checkBothGuessed();
    }, 500 + Math.random() * 1500);
  } else {
    document.getElementById('p2GuessWrap').style.display = 'block';
    document.getElementById('p2GuessTitle').textContent = `${p2.name} — מי יישאר?`;
    buildGuessGrid('guessGrid2', 2);
    document.getElementById('confirmGuessBtn2').disabled = true;
  }
}

function buildGuessGrid(containerId, playerNum) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  remaining.forEach(pol => {
    const btn = document.createElement('button');
    btn.className = 'guess-btn';
    btn.dataset.id = pol.id;
    btn.innerHTML = `<img src="${imgUrl(pol.id)}" onerror="this.style.display='none'"><span>${pol.name}</span>`;
    btn.onclick = () => selectGuess(pol, playerNum);
    grid.appendChild(btn);
  });
}

function selectGuess(pol, playerNum) {
  if (playerNum === 1 && p1GuessConfirmed) return;
  if (playerNum === 2 && p2GuessConfirmed) return;

  const gridId = playerNum === 1 ? 'guessGrid' : 'guessGrid2';
  document.querySelectorAll(`#${gridId} .guess-btn`).forEach(b => b.classList.remove('selected'));
  const btn = document.querySelector(`#${gridId} .guess-btn[data-id="${pol.id}"]`);
  if (btn) btn.classList.add('selected');

  if (playerNum === 1) {
    playerGuess = pol;
    document.getElementById('confirmGuessBtn').disabled = false;
  } else {
    player2Guess = pol;
    document.getElementById('confirmGuessBtn2').disabled = false;
  }
}

function confirmGuess() {
  if (!playerGuess) return;
  p1GuessConfirmed = true;
  document.getElementById('confirmGuessBtn').disabled = true;
  document.getElementById('statusMsg').textContent = `${players[0].name} ניחש: ${playerGuess.name}`;
  checkBothGuessed();
}

function confirmGuess2() {
  if (!player2Guess) return;
  p2GuessConfirmed = true;
  document.getElementById('confirmGuessBtn2').disabled = true;
  checkBothGuessed();
}

function checkBothGuessed() {
  if (!p1GuessConfirmed || !p2GuessConfirmed) return;
  showRoundResult();
}

function showRoundResult() {
  document.getElementById('guessSection').style.display = 'none';

  // Highlight loser
  renderPoliticians(false);
  const loserCard = document.querySelector(`.pol-card[data-id="${loser.id}"]`);
  if (loserCard) {
    loserCard.style.outline = '3px solid red';
    loserCard.style.borderRadius = '50%';
  }

  // Score
  const p1Correct = playerGuess && playerGuess.id === loser.id;
  const p2Correct = player2Guess && player2Guess.id === loser.id;
  if (p1Correct) players[0].score++;
  if (p2Correct) players[1].score++;

  // Result UI
  const p2 = players[1];
  let resultHTML = '';
  if (p1Correct && p2Correct) resultHTML = `שניכם צדקתם! 🎯 +1 לכל אחד`;
  else if (p1Correct) resultHTML = `${players[0].name} צדק! 🎯 +1`;
  else if (p2Correct) resultHTML = `${p2.name} צדק! 🎯 +1`;
  else resultHTML = `אף אחד לא צדק 😅`;

  document.getElementById('resultIcon').textContent = (p1Correct || p2Correct) ? '✅' : '❌';
  document.getElementById('resultText').textContent = resultHTML;
  document.getElementById('resultWho').textContent = `${loser.name} נשאר בלי כסא!`;
  document.getElementById('roundResult').classList.add('show');

  renderScores();

  // Eliminate loser
  eliminated.push(loser);
  remaining = remaining.filter(p => p.id !== loser.id);

  // Check if game over
  if (remaining.length === 1) {
    setTimeout(showWinner, 2000);
    const nextBtn = document.querySelector('.next-round-btn');
    if (nextBtn) nextBtn.style.display = 'none';
  }
}

function nextRound() {
  startRound();
}

function renderScores() {
  const bar = document.getElementById('scoresBar');
  bar.innerHTML = players.map(p => `
    <div class="score-card">
      <div class="name">${p.name}</div>
      <div class="pts">${p.score}</div>
    </div>
  `).join('');
}

function renderChairs() {
  const chairs = remaining.length - 1;
  const row = document.getElementById('chairsRow');
  row.innerHTML = '';
  for (let i = 0; i < remaining.length; i++) {
    const span = document.createElement('span');
    span.className = 'chair-icon' + (i >= chairs ? ' taken' : '');
    span.textContent = i < chairs ? '🪑' : '❌';
    row.appendChild(span);
  }
}

function renderPoliticians(moving) {
  const grid = document.getElementById('polGrid');
  grid.innerHTML = '';
  [...remaining, ...eliminated].forEach(pol => {
    const isElim = eliminated.find(e => e.id === pol.id);
    const div = document.createElement('div');
    div.className = 'pol-card' + (isElim ? ' eliminated' : '') + (moving && !isElim ? ' moving' : '');
    div.dataset.id = pol.id;
    div.innerHTML = `<img src="${imgUrl(pol.id)}" onerror="this.style.display='none'" alt="${pol.name}"><span>${pol.name}</span>`;
    grid.appendChild(div);
  });
}

function showWinner() {
  const winner = remaining[0];
  playWinMusic();
  showScreen('winnerScreen');
  document.getElementById('winnerImg').src = imgUrl(winner.id);
  document.getElementById('winnerName').textContent = winner.name;

  // Final scores
  const sorted = [...players].sort((a, b) => b.score - a.score);
  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('finalScores').innerHTML = `
    <h3 style="color:var(--gold);margin-bottom:12px">תוצאות המשחק</h3>
    ${sorted.map((p, i) => `
      <div class="final-score-row">
        <span>${medals[i] || '  '} ${p.name}</span>
        <span style="color:var(--gold);font-weight:700">${p.score} נקודות</span>
      </div>
    `).join('')}
  `;

  launchConfetti();
}

function playAgain() {
  stopAudio();
  clearConfetti();
  showScreen('setupScreen');
}

// ===== AUDIO =====
const audio = document.getElementById('audioPlayer');

function playMusic() {
  try {
    audio.src = GAME_MUSIC;
    audio.loop = true;
    audio.volume = 0.5;
    audio.play().catch(() => {});
  } catch(e) {}
}

function pauseAudio() {
  try { audio.pause(); } catch(e) {}
}

function stopAudio() {
  try { audio.pause(); audio.src = ''; } catch(e) {}
}

function playWinMusic() {
  try {
    audio.src = WIN_MUSIC;
    audio.loop = false;
    audio.volume = 0.7;
    audio.play().catch(() => {});
  } catch(e) {}
}

// ===== CONFETTI =====
function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#FFD700', '#FF0000', '#0000FF', '#00CC00', '#FF69B4', '#FFA500'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = '-20px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    p.style.animationDuration = (2 + Math.random() * 3) + 's';
    p.style.animationDelay = Math.random() * 2 + 's';
    c.appendChild(p);
  }
}

function clearConfetti() {
  document.getElementById('confetti').innerHTML = '';
}
</script>
</body>
</html>
